services:
  backend:
    build: ./backend
    container_name: coffeebns-backend
    env_file:
      - .env
    environment:
      POSTGRES_HOST: database
    ports:
      - "8000:8000"
    depends_on:
      database:
        condition: service_healthy
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"

  frontend:
    build: ./frontend
    container_name: coffeebns-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

  database:
    image: postgres:18
    container_name: coffeebns-database
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
